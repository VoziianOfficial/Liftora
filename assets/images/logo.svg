<svg width="310" height="82" viewBox="0 0 310 82" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="liftoraLogoTitle liftoraLogoDesc">
  <title id="liftoraLogoTitle">Liftora Logo</title>
  <desc id="liftoraLogoDesc">Liftora independent garage door matching platform logo with a stylized garage door and upward lift mark.</desc>

  <defs>
    <clipPath id="garageDoorClip">
      <rect x="9" y="10" width="58" height="50" rx="9"/>
    </clipPath>
  </defs>

  <g class="liftora-logo-mark">
    <rect x="4" y="5" width="68" height="62" rx="16" fill="#101214"/>

    <g clip-path="url(#garageDoorClip)">
      <rect x="10" y="12" width="56" height="48" rx="8" fill="#F5F1EA"/>

      <path d="M14 23.5H62" stroke="#101214" stroke-width="3" stroke-linecap="round"/>
      <path d="M14 34.5H62" stroke="#101214" stroke-width="3" stroke-linecap="round"/>
      <path d="M14 45.5H62" stroke="#101214" stroke-width="3" stroke-linecap="round"/>

      <path d="M25 16.5H51" stroke="#D9DEE2" stroke-width="2" stroke-linecap="round"/>
      <path d="M25 27.5H51" stroke="#D9DEE2" stroke-width="2" stroke-linecap="round"/>
      <path d="M25 38.5H51" stroke="#D9DEE2" stroke-width="2" stroke-linecap="round"/>
      <path d="M25 49.5H51" stroke="#D9DEE2" stroke-width="2" stroke-linecap="round"/>
    </g>

    <path d="M38 53V26" stroke="#F47A1F" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M28.5 34.5L38 25L47.5 34.5" stroke="#F47A1F" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M54 16C59.2 18.2 62.7 22.5 63.8 28.1" stroke="#F47A1F" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M59.8 13.2C66.8 16.5 71 22.6 71.5 30.4" stroke="#F47A1F" stroke-width="2.5" stroke-linecap="round" opacity=".7"/>

    <rect x="20" y="61" width="36" height="4" rx="2" fill="#F47A1F"/>
  </g>

  <g class="liftora-logo-wordmark">
    <text x="88" y="39" fill="#101214" font-family="Poppins, Inter, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="-1.4">
      Lift<tspan fill="#F47A1F">ora</tspan>
    </text>

    <rect x="89" y="47" width="78" height="4" rx="2" fill="#F47A1F"/>
    <rect x="172" y="47" width="34" height="4" rx="2" fill="#252A30" opacity=".9"/>

    <text x="89" y="65" fill="#3F515D" font-family="Inter, Arial, sans-serif" font-size="8.8" font-weight="800" letter-spacing="1.35">
